name: Release

# Dormant until a v* tag is pushed — that tag push is the deliberate "publish"
# action. Until then nothing here runs. The GitHub release is created as a DRAFT
# (see .goreleaser.yaml `release.draft: true`) for manual review before going live.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # create the GitHub release + upload assets
  id-token: write # cosign keyless (Sigstore OIDC) signing

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0 # full history so the changelog can diff against the prior tag
          # The test step below executes repo + dependency code; don't leave the
          # contents:write git token sitting in .git/config for it. GoReleaser
          # doesn't need git credentials — the changelog reads local history and
          # the release is created via the API token on its own step.
          persist-credentials: false
      - name: assert the npm token is configured
        # Fail fast, before anything is built, signed, or published: npm is an
        # established release channel (0.1.0+ ship there), so a missing/expired
        # NPM_TOKEN must kill the release visibly rather than silently skip npm
        # and let the registry fall behind the GitHub release. This step runs
        # no repo code; the secret otherwise only enters the publish step's
        # environment at the very end of the job.
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NPM_TOKEN" ]; then
            echo "::error::secrets.NPM_TOKEN is missing or empty; refusing to release. Configure the secret, or edit release.yml if npm is deliberately no longer a release channel."
            exit 1
          fi
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5.6.0
        with:
          # Build released binaries with the latest patched Go so they don't ship
          # known standard-library CVEs (see the CI govulncheck note).
          go-version: "stable"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "lts/*" # web.go behavioral tests need node, else they t.Skip
      - name: test
        # Gate the release on vet + the test suite. A v* tag can point at a
        # commit that never went through CI (tagged locally and pushed
        # directly), and nothing in this workflow waits for the CI workflow.
        # Honest scope: this only protects tags whose tree contains this gate
        # (a tag onto an older tree runs THAT tree's workflow); it is
        # linux-only by design (CI covers macOS, and released darwin binaries
        # are cross-compiled, never executed here). The suite runs in full, so
        # it inherits internal/supervisor's known flaky test — a release can
        # fail on a flake and need a re-run. That is acceptable here: the
        # failure lands before signing/publish so nothing has shipped, the
        # re-run pins the same SHA, and release.replace_existing_draft cleans
        # up any draft a prior attempt left behind.
        timeout-minutes: 15
        run: |
          go vet ./...
          go test ./...
      - uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: "~> 2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # npm distribution, signed with build provenance (Sigstore, via the
      # id-token permission above). npm is an established release channel, so
      # its token is asserted up front (see the top of this job) instead of
      # conditionally skipping these steps. Reuses the binaries GoReleaser
      # already built into dist/ this run, so the npm payload is the SAME
      # artifact as the release archives.
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"
      - name: Publish npm packages with provenance
        env:
          # Step-scoped on purpose: together with the up-front assertion this
          # is the ONLY place the secret enters an environment (the test suite
          # executes repo + dependency code and spawns node children that
          # inherit the env, so it must never see the token).
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          version="${GITHUB_REF_NAME#v}"
          node scripts/build-npm.mjs "$version"
          # Prerelease versions (e.g. 0.1.0-rc.0) must NOT land on the `latest`
          # dist-tag — npm requires an explicit --tag for them. Route prereleases
          # to `next`; stable versions to `latest`.
          case "$version" in
            *-*) npm_tag="next" ;;
            *)   npm_tag="latest" ;;
          esac
          # Idempotent across re-runs: npm refuses to publish over an existing
          # version (E403), so after a partial failure (platform packages live,
          # launcher not) a plain re-run would die on the FIRST already-published
          # package and never reach the missing ones. Skip a package only when
          # the registry already reports exactly this version. Compare output,
          # not exit status: `npm view pkg@absent-version` exits 0 on some npm
          # versions, and a transient `npm view` failure then just means we
          # attempt the publish (worst case: the E403 we'd have hit anyway).
          publish() {
            name=$(node -p "require('$1/package.json').name")
            if [ "$(npm view "${name}@${version}" version 2>/dev/null || true)" = "$version" ]; then
              echo "skipping ${name}@${version}: already on the registry (re-run after a partial publish)"
            else
              npm publish --provenance --access public --tag "$npm_tag" "$1"
            fi
          }
          # Platform packages first so the launcher's optionalDependencies resolve.
          # ./-prefix the paths: npm reads a bare single-slash arg like `npm/ccwrap`
          # as a github:owner/repo spec, not a local directory (the two-slash
          # platform paths happen to dodge it, but be explicit for both).
          for d in darwin-arm64 darwin-amd64 linux-arm64 linux-amd64; do
            publish "./npm/platforms/$d"
          done
          publish ./npm/ccwrap-cli
