name: Fingerprint Drift Watch

# ccwrap's whole value is that the upstream sees Claude Code's REAL undici TLS
# fingerprint, not ccwrap's. That depends on matching undici's *current*
# fingerprint — and when Node/undici updates, the fingerprint can shift and the
# committed baseline goes stale. Normal CI skips the live check (it needs a real
# node-undici process). This scheduled job runs it so drift surfaces proactively
# instead of silently degrading anonymity in the field.
#
# NOTE: GitHub auto-disables `schedule` workflows after ~60 days without repo
# activity — exactly the maintenance-lull window when undici drift is most
# likely to go unnoticed. If the repo goes quiet, this watch silently stops;
# re-enable it under the Actions tab (or push any commit).
on:
  schedule:
    - cron: "0 6 * * 1" # weekly, Monday 06:00 UTC
  workflow_dispatch: {} # allow on-demand runs

permissions:
  contents: read

jobs:
  livefp:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "stable"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "lts/*"
      - name: guard against a vacuous run
        # internal/supervisor/livefp_test.go is committed, but keep this guard
        # as defense in depth against it being deleted or re-gitignored:
        # `go test -run X` exits 0 when zero tests match. The "no tests to run"
        # check on the live step below would also catch that — but only after
        # spending a live-network run; this one fails first, with a message
        # that names the remediation. Removing the test has to be a visible
        # decision: restore it or retire this workflow with it.
        run: |
          if [ ! -f internal/supervisor/livefp_test.go ]; then
            echo "::error::internal/supervisor/livefp_test.go is missing from the checkout. The fingerprint drift watch CANNOT run — restore the livefp test or remove this workflow."
            exit 1
          fi
      - name: live mirror-fidelity + baseline check
        # Hard-fails if ccwrap's mirrored ClientHello != live undici's (mirror
        # broke); logs whether live undici still matches the committed baseline
        # (Node/undici drift). The job's pass/fail + log is the alert.
        # Belt-and-braces: also fail if the -run pattern matched nothing (e.g.
        # the test was renamed) — see the vacuous-run guard above.
        run: |
          out=$(go test ./internal/supervisor/ -tags livefp -run 'TestLiveFingerprintCompare' -v 2>&1) || { echo "$out"; exit 1; }
          echo "$out"
          if echo "$out" | grep -q "no tests to run"; then
            echo "::error::-run TestLiveFingerprintCompare matched no tests; the drift watch ran vacuously."
            exit 1
          fi
