name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

# A newer push to the same branch/PR supersedes the in-flight run; cancel it
# instead of paying for both. github.ref is unique per branch and per PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "stable"
      - name: gofmt
        run: |
          unformatted=$(git ls-files '*.go' | grep -v '^claude-code/' | xargs gofmt -l)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi
      - name: go vet
        run: go vet ./...

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "stable"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          # The web dashboard's behavioral tests (web.go) run the rendered JS
          # under a real `node` process and t.Skip silently when node is absent.
          # Install it explicitly so those tests always run, instead of relying
          # on the runner image happening to ship node.
          node-version: "lts/*"
      - name: build
        run: go build ./...
      - name: test
        run: go test ./...

  race:
    runs-on: ubuntu-latest
    timeout-minutes: 30 # -race is several× slower than the plain suite
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "stable"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "lts/*" # web.go behavioral tests need node, else they t.Skip
      - name: test -race
        run: go test -race ./...

  scripts:
    # The distribution entry points (install.sh, the npm launcher) aren't covered
    # by `go test` but are exactly the files a user pipes into `sh` / runs via npx.
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "lts/*"
      - name: shellcheck install.sh
        run: shellcheck install.sh
      - name: node --check (npm launcher + build script)
        run: |
          node --check npm/ccwrap-cli/bin/ccwrap.js
          node --check scripts/build-npm.mjs

  release-config:
    # Validate the release pipeline on every PR: `goreleaser check` catches a
    # broken .goreleaser.yaml, and a snapshot release cross-compiles ALL targets
    # (darwin/linux x amd64/arm64) — the host-only `test` job above would miss a
    # linux/arm64 or darwin/amd64 cross-compile break — and produces the real
    # archives, so the npm staging step below can prove it still mates with them.
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "stable"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "lts/*"
      - uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6.4.0
        with:
          distribution: goreleaser
          version: "~> 2"
          install-only: true
      - name: goreleaser check
        run: goreleaser check
      - name: goreleaser release (snapshot — all platforms, real archives)
        # Same skips as the local rehearsal documented in .goreleaser.yaml:
        # signing/SBOM need CI identity + syft, and a snapshot has nothing to
        # publish anyway.
        run: goreleaser release --snapshot --clean --skip=publish,sign,sbom
      - name: stage npm packages against the snapshot archives
        # build-npm.mjs locates the tar.gz archives by reconstructing their
        # name_template-derived filenames. Exercise that coupling here so a
        # name_template (or build-npm) change fails on the PR — previously it
        # was executed for the first time halfway through a real release.
        run: |
          version=$(node -p "require('./dist/metadata.json').version")
          node scripts/build-npm.mjs "$version"

  govulncheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Advisory, NOT a hard gate: govulncheck's findings against ccwrap are
    # exclusively Go standard-library CVEs reached via crypto/tls + crypto/x509
    # (zero in ccwrap's own code, zero in actually-called deps). Those clear by
    # building with a newer Go patch — but there is almost always a just-disclosed
    # stdlib CVE whose fix is in the very latest patch, so gating on it would red
    # the build on toolchain-lag, not on a real ccwrap regression. We run it for
    # visibility (the log tells you which Go patch to bump to) without blocking.
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version: "stable"
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          "$(go env GOPATH)/bin/govulncheck" ./...
